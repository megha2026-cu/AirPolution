<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Air Quality Monitor</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-body">
    <main class="login-card">
        <div class="login-brand">
            <h1>Air Quality Monitor</h1>
            <p>Sign in to view pollution trends and alerts</p>
        </div>

        <form id="login-form" novalidate>
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autocomplete="username" required autofocus>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required>

            <button type="submit" class="btn-primary" id="login-submit">Sign In</button>

            <p id="login-error" class="login-error hidden" role="alert"></p>
        </form>

        <footer class="login-footer">
            Plag Pro, Noida &mdash; Group: UG/Dr. Vandana/7/2026/15
        </footer>
    </main>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
